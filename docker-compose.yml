# Single-host stack: api + postgres. `docker compose up --build`.
# Behind an nginx reverse proxy (same-origin SPA) in production; here the API is
# exposed directly on :8080 for convenience.

x-app-env: &app-env
  NODE_ENV: production
  PORT: "8080"
  DATABASE_URL: postgresql://${POSTGRES_USER:-boilerplate}:${POSTGRES_PASSWORD:-boilerplate_dev}@postgres:5432/${POSTGRES_DB:-boilerplate}?schema=public
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-set-a-32char-secret}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3100}
  STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
  ENABLE_DOCS: ${ENABLE_DOCS:-true}

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "true" # apply migrations on startup
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boilerplate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boilerplate_dev}
      POSTGRES_DB: ${POSTGRES_DB:-boilerplate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boilerplate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
